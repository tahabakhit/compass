interface:
  display_name: "Task Router"
  short_description: "Classify requests into the right work mode"
  default_prompt: "Use $task-router to choose the right workflow and native mode for this task."
policy:
  allow_implicit_invocation: true
routing:
  triggers:
    - task router
    - use sinan
    - route this
    - choose workflow
    - orchestrate
  intents:
    - clarify
    - implement
    - debug
    - review
    - research
    - cleanup
    - architecture
    - handoff
    - setup
  task_sizes:
    - light
    - full
    - workflow
  allow_implicit_invocation: true
