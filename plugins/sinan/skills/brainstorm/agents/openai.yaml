interface:
  display_name: "Brainstorm"
  short_description: "Shape ambiguous ideas into decisions"
  default_prompt: "Use $brainstorm to shape this idea before planning or implementation."
policy:
  allow_implicit_invocation: false
routing:
  triggers:
    - brainstorm
    - think through
    - shape this idea
    - product direction
    - grill me
    - clarify
    - ambiguous
    - acceptance criteria
  intents:
    - clarify
    - implement
    - architecture
  task_sizes:
    - light
    - full
  allow_implicit_invocation: false
