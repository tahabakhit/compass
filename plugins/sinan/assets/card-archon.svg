<svg xmlns="http://www.w3.org/2000/svg" width="560" height="220" viewBox="0 0 560 220">
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="ca-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#d4630a"/>
    </linearGradient>
    <filter id="ca-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ca-mono { font-family: 'SF Mono','Cascadia Code','Consolas',monospace; }
      .ca-sans { font-family: 'Segoe UI',system-ui,-apple-system,sans-serif; }
      @keyframes ca-pulse {
        0%,100% { opacity: 0.35; }
        50%      { opacity: 0.9; }
      }
      @keyframes ca-orbit {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .ca-core   { animation: ca-pulse 3s ease-in-out 0.8s infinite; }
      .ca-orbiter { transform-origin: 60px 110px; animation: ca-orbit 8s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="560" height="220" rx="12" fill="url(#ca-bg)"/>
  <pattern id="ca-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.7" fill="#1e2632" opacity="0.8"/>
  </pattern>
  <rect width="560" height="220" rx="12" fill="url(#ca-dots)" opacity="0.6"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="559" height="219" rx="12" fill="none" stroke="#1e2632" stroke-width="1.5"/>

  <!-- Gradient top bar -->
  <rect x="18" y="0" width="524" height="3" rx="1.5" fill="url(#ca-top)" opacity="0.85"/>

  <!-- Left color bar -->
  <rect x="0" y="0" width="4" height="220" rx="2" fill="#f0883e" opacity="0.75"/>

  <!-- Icon section: hexagon + orbit -->
  <circle cx="60" cy="110" r="40" fill="none" stroke="#f0883e" stroke-width="1" opacity="0.18"/>
  <!-- Hexagon (campaign phases) -->
  <polygon points="60,74 88,91 88,126 60,143 32,126 32,91"
    fill="none" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Phase ticks inside hexagon -->
  <line x1="60" y1="82" x2="60" y2="90" stroke="#f0883e" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="130" x2="60" y2="138" stroke="#f0883e" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="92" x2="76" y2="99" stroke="#f0883e" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="120" x2="44" y2="127" stroke="#f0883e" stroke-width="1" opacity="0.4"/>
  <!-- Orbiting dot -->
  <g class="ca-orbiter">
    <circle cx="60" cy="70" r="3" fill="#f0883e" opacity="0.7"/>
  </g>
  <circle class="ca-core" cx="60" cy="110" r="8" fill="#f0883e" filter="url(#ca-glow)" opacity="0.35"/>
  <circle cx="60" cy="110" r="4" fill="#f0883e" opacity="0.9"/>

  <!-- Vertical divider -->
  <line x1="115" y1="22" x2="115" y2="198" stroke="#1c2330" stroke-width="1"/>

  <!-- TITLE -->
  <text x="134" y="56" class="ca-sans" font-size="28" font-weight="900" fill="#e6edf3" letter-spacing="4">ARCHON</text>

  <!-- Role -->
  <text x="134" y="76" class="ca-mono" font-size="10" fill="#f0883e" letter-spacing="2.5" opacity="0.85">AUTONOMOUS STRATEGIST</text>

  <!-- Invoke badge -->
  <rect x="134" y="84" width="80" height="18" rx="9" fill="#160d02" stroke="#f0883e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="174" y="97" class="ca-mono" font-size="10" fill="#f0883e" text-anchor="middle">/archon</text>

  <!-- Section divider -->
  <line x1="124" y1="114" x2="544" y2="114" stroke="#1c2330" stroke-width="1"/>

  <!-- Bullets -->
  <circle cx="136" cy="134" r="3.5" fill="#f0883e" opacity="0.85"/>
  <text x="149" y="138" class="ca-sans" font-size="13" fill="#c9d1d9">Campaigns that survive across sessions</text>

  <circle cx="136" cy="160" r="3.5" fill="#f0883e" opacity="0.85"/>
  <text x="149" y="164" class="ca-sans" font-size="13" fill="#c9d1d9">Self-corrects direction every 2 phases</text>

  <circle cx="136" cy="186" r="3.5" fill="#f0883e" opacity="0.85"/>
  <text x="149" y="190" class="ca-sans" font-size="13" fill="#c9d1d9">State written to disk — never lost</text>
</svg>
