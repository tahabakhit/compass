<svg xmlns="http://www.w3.org/2000/svg" width="560" height="220" viewBox="0 0 560 220">
  <defs>
    <linearGradient id="cm-bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cm-top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <filter id="cm-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .cm-mono { font-family: 'SF Mono','Cascadia Code','Consolas',monospace; }
      .cm-sans { font-family: 'Segoe UI',system-ui,-apple-system,sans-serif; }
      @keyframes cm-pulse {
        0%,100% { opacity: 0.35; }
        50%      { opacity: 0.9; }
      }
      .cm-core { animation: cm-pulse 2.8s ease-in-out 0.4s infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="560" height="220" rx="12" fill="url(#cm-bg)"/>
  <pattern id="cm-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.7" fill="#1e2632" opacity="0.8"/>
  </pattern>
  <rect width="560" height="220" rx="12" fill="url(#cm-dots)" opacity="0.6"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="559" height="219" rx="12" fill="none" stroke="#1e2632" stroke-width="1.5"/>

  <!-- Gradient top bar -->
  <rect x="18" y="0" width="524" height="3" rx="1.5" fill="url(#cm-top)" opacity="0.85"/>

  <!-- Left color bar -->
  <rect x="0" y="0" width="4" height="220" rx="2" fill="#58a6ff" opacity="0.75"/>

  <!-- Icon section: chained nodes -->
  <circle cx="60" cy="110" r="40" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.18"/>
  <circle cx="60" cy="110" r="28" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.12"/>
  <!-- Chain: three linked nodes -->
  <line x1="38" y1="98" x2="60" y2="110" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="110" x2="82" y2="98" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="110" x2="60" y2="130" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="38" cy="98" r="5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="82" cy="98" r="5" fill="#58a6ff" opacity="0.5"/>
  <circle cx="60" cy="130" r="5" fill="#58a6ff" opacity="0.4"/>
  <circle class="cm-core" cx="60" cy="110" r="8" fill="#58a6ff" filter="url(#cm-glow)" opacity="0.35"/>
  <circle cx="60" cy="110" r="4" fill="#58a6ff" opacity="0.9"/>

  <!-- Vertical divider -->
  <line x1="115" y1="22" x2="115" y2="198" stroke="#1c2330" stroke-width="1"/>

  <!-- TITLE -->
  <text x="134" y="56" class="cm-sans" font-size="28" font-weight="900" fill="#e6edf3" letter-spacing="4">MARSHAL</text>

  <!-- Role -->
  <text x="134" y="76" class="cm-mono" font-size="10" fill="#58a6ff" letter-spacing="2.5" opacity="0.85">SESSION COMMANDER</text>

  <!-- Invoke badge -->
  <rect x="134" y="84" width="84" height="18" rx="9" fill="#08121e" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="176" y="97" class="cm-mono" font-size="10" fill="#58a6ff" text-anchor="middle">/marshal</text>

  <!-- Section divider -->
  <line x1="124" y1="114" x2="544" y2="114" stroke="#1c2330" stroke-width="1"/>

  <!-- Bullets -->
  <circle cx="136" cy="134" r="3.5" fill="#58a6ff" opacity="0.85"/>
  <text x="149" y="138" class="cm-sans" font-size="13" fill="#c9d1d9">Chains skills autonomously, single session</text>

  <circle cx="136" cy="160" r="3.5" fill="#58a6ff" opacity="0.85"/>
  <text x="149" y="164" class="cm-sans" font-size="13" fill="#c9d1d9">Enforces quality gates between steps</text>

  <circle cx="136" cy="186" r="3.5" fill="#58a6ff" opacity="0.85"/>
  <text x="149" y="190" class="cm-sans" font-size="13" fill="#c9d1d9">Safest default for multi-step work</text>
</svg>
